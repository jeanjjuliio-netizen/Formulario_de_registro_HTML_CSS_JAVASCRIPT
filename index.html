<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller: Formulario Pro</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <div class="contenedor-principal">
        <form id="formulario-registro" novalidate>
            <h2>Crea tu Cuenta</h2>

            <div class="datos-entrada">
                <label for="nombreusuario">Nombre de Usuario</label>
                <input type="text" id="nombreusuario" placeholder="Ej: dev_master" required minlength="4">
                <span class="mensaje-error">El usuario debe tener al menos 4 caracteres.</span>
            </div>

            <div class="datos-entrada">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" placeholder="tu@correo.com" required>
                <span class="mensaje-error">Ingresa un correo electrónico válido.</span>
            </div>

            <div class="datos-entrada">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" placeholder="Letras y números" required 
                       pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$">
                <div class="nivel-seguridad" id="nivel-seguridad"></div>
                <span class="mensaje-error">Mínimo 8 caracteres (letras y números).</span>
            </div>

            <button type="submit" id="botonenviar">Registrarme</button>

            <div id="mensaje-exito" class="mensaje-confirmacion">
                ¡Registro completado con éxito!
            </div>
        </form>
    </div>
</body>
</html>
